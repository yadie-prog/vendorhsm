<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Input Monitoring Data Vendor</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header-nav">
    <div style="font-weight: 700; font-size: 1.2rem; letter-spacing: 0.5px;">HYUNDAI SOLUSI MOBILITAS SYSTEM</div>
    <div class="pic-tag">PIC: <span id="displayPIC">Loading...</span></div>
  </header>

  <main class="container" style="flex: 1; display: flex; align-items: center;">
    <div class="card" style="max-width: 600px;">
      <h3 style="margin-bottom: 20px; color: var(--primary-color); border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">Form Vendor</h3>
      
      <form id="inputForm">
        <div class="flex-container">
          <div class="form-group" style="flex: 1;">
            <label>Tanggal Input</label>
            <input type="text" id="tanggalInput" class="form-control" disabled>
          </div>
          <div class="form-group" style="flex: 1;">
            <label>Nama Bengkel</label>
            <input type="text" id="namaBengkel" class="form-control" disabled>
          </div>
        </div>

        <div class="form-group">
          <label for="noWO">Nomor Working Order</label>
          <input type="text" id="noWO" class="form-control uppercase-input" required placeholder="Contoh: 0001/WO/HSM/05/2026">
        </div>

        <div class="form-group">
          <label for="invoiceNo">Invoice Number</label>
          <input type="text" id="invoiceNo" class="form-control uppercase-input" required placeholder="Contoh: INV-.....">
        </div>
        
        <div class="form-group">
          <label for="deskripsi">Deskripsi</label>
          <textarea id="deskripsi" class="form-control uppercase-input" rows="3" placeholder="MASUKKAN DESKRIPSI ATAU CATATAN TAMBAHAN (CONTOH: PERBAIKAN STEERING COLUMN SHAFT)"></textarea>
        </div>

        <div class="flex-container">
          <div class="form-group" style="flex: 1;">
            <label for="taxInvoiceNo">TAX Invoice Number</label>
            <input type="text" id="taxInvoiceNo" class="form-control uppercase-input" required placeholder="04002500....">
          </div>
          <div class="form-group" style="flex: 1;">
            <label for="taxInvoiceDate">TAX Invoice Date</label>
            <input type="date" id="taxInvoiceDate" class="form-control" required>
          </div>
        </div>

        <div class="flex-container">
          <div class="form-group" style="flex: 1;">
            <label for="fee">FEE (IDR)</label>
            <input type="number" id="fee" class="form-control" required placeholder="0">
          </div>
          <div class="form-group" style="flex: 1;">
            <label for="vat">VAT / PPN (IDR)</label>
            <input type="number" id="vat" class="form-control" required placeholder="0">
          </div>
        </div>

        <button type="submit" id="btnSubmit" class="btn btn-primary">Simpan Data</button>
        <a href="database.html" class="btn btn-secondary">Cek Database</a>
        <button type="button" onclick="logout()" class="btn btn-secondary" style="background-color: #fef2f2; color: #ef4444;">Ganti Bengkel / Keluar</button>
      </form>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
